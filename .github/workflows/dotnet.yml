name: Dotnet Build 

on:
  push:
    branches: [develop]
    tags: ["*"]
  pull_request:
    branches: [develop, main]


jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ./OsuNet.slnx -v minimal --locked-mode

      - name: Build
        run: dotnet build ./OsuNet.slnx -v minimal -c Release --no-restore

      - name: Test
        run: dotnet test ./OsuNet.slnx -v minimal -c Release --no-restore --no-build --logger trx

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: failure() || success()
        with:
          files: ./**/*.trx

      - name: Pack
        run: |
          dotnet pack ./src/OsuNet/OsuNet.csproj -v minimal -c Release --no-restore --no-build -o artifacts
          dotnet pack ./src/OsuNet.Replays/OsuNet.Replays.csproj -v minimal -c Release --no-restore --no-build -o artifacts

      - name: Publish Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: osunet
          path: artifacts/*

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    env:
      IsTagBuild: false
      REPOSITORY_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - uses: actions/checkout@v5

      - name: Is Tag Build
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "IsTagBuild=true" >> $GITHUB_ENV

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: osunet
          path: artifacts

      - name: Publish to NuGet.org
        if: env.IsTagBuild == 'true'
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        if: env.IsTagBuild == 'true'
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "${{ env.REPOSITORY_URL }}" --skip-duplicate
name: Dotnet Build 

on:
  push:
    branches:
      - develop
    tags: "*"
  pull_request:
    branches:
      - develop
      - main

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ./OsuNet.sln -v minimal --locked-mode

      - name: Build
        run: dotnet build ./OsuNet.sln -v minimal -c Release --no-restore

      - name: Test
        run: dotnet test ./OsuNet.sln -v minimal -c Release --no-restore --no-build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    env:
      IsTagBuild: false
      REPOSITORY_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - uses: actions/checkout@v5

      - name: Is Tag Build
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "IsTagBuild=true" >> $GITHUB_ENV

      - name: setup NuGet
        uses: nuget/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Pack
        run: nuget pack ./OsuNet/OsuNet.csproj -c Release -o ./artifacts

      - name: Publish to NuGet.org
        if: env.IsTagBuild == 'true'
        run: nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to GitHub Packages
        if: env.IsTagBuild == 'true'
        run: nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.GITHUB_TOKEN }}" --source "${{ env.REPOSITORY_URL }}" --skip-duplicate